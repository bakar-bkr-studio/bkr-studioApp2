name: Security CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-gate:
    name: Build & Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build and production audit
        run: npm run security:check

      - name: Run full dependency audit (scheduled/manual only)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: npm run security:audit
